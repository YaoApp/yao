# ── Desktop-only (no agent CLI) ─────────────────────────────
# These images provide only a desktop environment without any coding agent CLI.
# Useful as base for custom agents or for manual VNC access.
# Runner: tai only (no claude/opencode)

- name: desktop
  image: yaoapp/tai-sandbox-desktop:latest
  description: "Full XFCE4 desktop + Chromium + VNC. No agent CLI. Use as base or for VNC-only tasks."
  runners: [tai]
  features: [desktop-xfce4, chromium, vnc, chinese-locale, fcitx5]

- name: desktop-lite
  image: yaoapp/tai-sandbox-desktop-lite:latest
  description: "Lightweight Fluxbox desktop + Chromium + VNC. No agent CLI. Smallest desktop image."
  runners: [tai]
  features: [desktop-fluxbox, chromium, vnc, chinese-locale, fcitx5]
