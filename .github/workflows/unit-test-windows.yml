jobs:
  core-test-windows:
    name: ${{ matrix.db }}
    runs-on: windows-2025
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        go: ["1.26"]
        db: [SQLite3, Postgres17]

    steps:
      # ── 1. Checkout dependency repos ─────────────────────────────────
      - name: Checkout Kun
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_KUN }}
          path: kun

      - name: Checkout Xun
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_XUN }}
          path: xun

      - name: Checkout Gou
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_GOU }}
          path: gou

      - name: Checkout V8Go
        uses: actions/checkout@v4
        with:
          repository: yaoapp/v8go
          lfs: true
          path: v8go

      - name: Checkout Demo App
        uses: actions/checkout@v4
        with:
          repository: yaoapp/yao-dev-app
          path: app

      - name: Checkout Yao Startup Webapp
        uses: actions/checkout@v4
        with:
          repository: yaoapp/yao-startup-webapp
          submodules: true
          token: ${{ secrets.YAO_TEST_TOKEN }}
          path: yao-startup-webapp

      - name: Checkout Extension
        uses: actions/checkout@v4
        with:
          repository: yaoapp/yao-extensions-dev
          path: extension

      # ── 2. Unzip libv8 ──────────────────────────────────────────────
      - name: Unzip libv8
        shell: bash
        run: |
          files=$(find ./v8go -name "libv8*.zip")
          for file in $files; do
            dir=$(dirname "$file")
            echo "Extracting $file to directory $dir"
            unzip -o -d "$dir" "$file"
            rm -rf "$dir/__MACOSX"
          done

      # ── 3. Move deps to parent directory ────────────────────────────
      - name: Move dependencies
        shell: bash
        run: |
          mv kun ../
          mv xun ../
          mv gou ../
          mv v8go ../
          mv app ../
          mv extension ../
          mv yao-startup-webapp ../

      # ── 4. Checkout yao itself ──────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 5. Setup Apple Private Key ──────────────────────────────────
      - name: Setup Apple Private Key
        shell: bash
        run: |
          mkdir -p ../app/openapi/certs/apple
          echo "${{ secrets.APPLE_PRIVATE_KEY_USER }}" > ../app/openapi/certs/apple/signin_client_secret_key.p8

      # ── 6. Setup Go ────────────────────────────────────────────────
      - name: Setup Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      # ── 7. Install LLVM (clang + lld) ──────────────────────────────
      - name: Install LLVM
        run: choco install llvm -y

      # ── 8. Setup Go Tools ──────────────────────────────────────────
      - name: Setup Go Tools
        shell: bash
        run: make tools

      # ── 9. Setup MySQL ───────────────────────────────────────────────
      - name: Install MySQL
        run: choco install mysql -y --params "/Port:3308"

      - name: Add MySQL to PATH
        shell: bash
        run: echo "C:/tools/mysql/current/bin" >> $GITHUB_PATH

      - name: Create MySQL database and user
        run: |
          mysql -u root -P 3308 -e "CREATE DATABASE IF NOT EXISTS test;"
          mysql -u root -P 3308 -e "CREATE USER 'test'@'localhost' IDENTIFIED BY '123456';"
          mysql -u root -P 3308 -e "GRANT ALL PRIVILEGES ON test.* TO 'test'@'localhost';"
          mysql -u root -P 3308 -e "FLUSH PRIVILEGES;"

      # ── 10. Setup MongoDB with Auth ────────────────────────────────
      - name: Setup MongoDB with Auth
        shell: pwsh
        run: |
          Start-Service MongoDB
          mongosh --eval "db.createUser({user:'root',pwd:'123456',roles:['root']})" admin
          Stop-Service MongoDB
          Add-Content -Path "C:\Program Files\MongoDB\Server\7.0\bin\mongod.cfg" -Value "`nsecurity:`n  authorization: enabled"
          Start-Service MongoDB

      # ── 11. Setup Redis (Memurai) ──────────────────────────────────
      - name: Install Memurai (Redis)
        run: choco install memurai-developer -y

      # ── 12. Setup PostgreSQL (conditional) ──────────────────────────
      - name: Setup PostgreSQL
        if: matrix.db == 'Postgres17'
        uses: ankane/setup-postgres@v1
        with:
          postgres-version: "17"
          database: xiang
          user: xiang

      - name: Set PostgreSQL password
        if: matrix.db == 'Postgres17'
        run: psql -U postgres -c "ALTER USER xiang PASSWORD '${{ secrets.UNIT_PASS }}';"

      # ── 13. Verify Services (fail-fast) ─────────────────────────────
      - name: Verify Services
        shell: bash
        run: |
          echo "=== Verify MySQL ==="
          mysql -u root -P 3308 -e "SELECT 1;" || { echo "::error::MySQL not reachable on port 3308"; exit 1; }

          echo "=== Verify Redis (Memurai) ==="
          powershell.exe -Command "Test-NetConnection -ComputerName 127.0.0.1 -Port 6379 -InformationLevel Quiet" || { echo "::error::Redis not reachable on port 6379"; exit 1; }

          echo "=== Verify MongoDB ==="
          mongosh --host 127.0.0.1 --port 27017 -u root -p 123456 --authenticationDatabase admin --eval "db.runCommand({ping:1})" || { echo "::error::MongoDB not reachable or auth failed"; exit 1; }

          if [ "${{ matrix.db }}" = "Postgres17" ]; then
            echo "=== Verify PostgreSQL ==="
            psql -U postgres -c "SELECT 1;" || { echo "::error::PostgreSQL not reachable"; exit 1; }
          fi

          echo "All services verified."

      # ── 14. Setup ENV & Hosts ───────────────────────────────────────
      - name: Add local.iqka.com to hosts
        shell: powershell
        run: Add-Content -Path "$env:SystemRoot\System32\drivers\etc\hosts" -Value "`n127.0.0.1`tlocal.iqka.com" -Force

      # ── 15. Setup ENV ────────────────────────────────────────────────
      - name: Setup ENV
        shell: bash
        env:
          PASSWORD: ${{ secrets.UNIT_PASS }}
        run: |
          if [ "${{ matrix.db }}" = "Postgres17" ]; then
            echo "YAO_DB_DRIVER=postgres" >> $GITHUB_ENV
            echo "YAO_DB_PRIMARY=postgres://xiang:${PASSWORD}@127.0.0.1:5432/xiang?sslmode=disable" >> $GITHUB_ENV
          else
            mkdir -p "${{ github.WORKSPACE }}/../app/db"
            echo "YAO_DB_DRIVER=sqlite3" >> $GITHUB_ENV
            echo "YAO_DB_PRIMARY=${{ github.WORKSPACE }}/../app/db/yao.db" >> $GITHUB_ENV
          fi

      # ── 16. Run Core Tests ─────────────────────────────────────────
      - name: Run Core Tests
        shell: bash
        env:
          CGO_ENABLED: "1"
          CC: clang --target=x86_64-pc-windows-msvc -fuse-ld=lld
          CXX: clang++ --target=x86_64-pc-windows-msvc -fuse-ld=lld -fno-exceptions
        run: make unit-test-core-windows
