name: Debug WSL Docker

on:
  workflow_dispatch:

jobs:
  debug-docker:
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - name: Setup WSL (Ubuntu 24.04)
        uses: Vampire/setup-wsl@v7
        with:
          distribution: Ubuntu-24.04
          additional-packages: ca-certificates curl gnupg

      - name: Install Docker Engine in WSL
        shell: wsl-bash {0}
        run: |
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
          apt-get update
          apt-get install -y docker-ce docker-ce-cli containerd.io

      - name: Restart Docker daemon with TCP listener
        shell: wsl-bash {0}
        run: |
          mkdir -p /etc/docker
          cat > /etc/docker/daemon.json << 'EOF'
          { "hosts": ["tcp://0.0.0.0:2375", "unix:///var/run/docker.sock"] }
          EOF
          kill $(cat /var/run/docker.pid 2>/dev/null) 2>/dev/null || true
          sleep 2
          rm -f /var/run/docker.pid
          dockerd --config-file /etc/docker/daemon.json > /tmp/dockerd.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:2375/version > /dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://127.0.0.1:2375/version > /dev/null 2>&1 || {
            echo "::error::Docker daemon failed to start"
            cat /tmp/dockerd.log
            exit 1
          }
          echo "=== Docker daemon ready ==="

      - name: Verify Docker (from WSL)
        shell: wsl-bash {0}
        run: |
          echo "=== docker version ==="
          docker version
          echo "=== docker info ==="
          docker info
          echo "=== docker ps ==="
          docker ps

      - name: Discover WSL IP and setup port forwarding
        shell: powershell
        run: |
          # Get the WSL2 VM IP address
          $wslIp = (wsl hostname -I).Trim().Split(' ')[0]
          Write-Host "WSL2 IP address: $wslIp"

          # Verify Docker is reachable at the WSL IP
          Write-Host "=== Testing direct connection to WSL IP ==="
          try {
            $resp = Invoke-WebRequest -Uri "http://${wslIp}:2375/version" -UseBasicParsing -TimeoutSec 5
            Write-Host "Direct connection to WSL IP works!"
            Write-Host $resp.Content
          } catch {
            Write-Host "Direct connection failed: $_"
          }

          # Setup port forwarding: Windows 127.0.0.1:2375 -> WSL IP:2375
          Write-Host "=== Setting up port forwarding ==="
          netsh interface portproxy add v4tov4 listenport=2375 listenaddress=127.0.0.1 connectport=2375 connectaddress=$wslIp
          Write-Host "Port forwarding configured"

          # Verify port forwarding is active
          netsh interface portproxy show v4tov4

          # Wait a moment for forwarding to take effect
          Start-Sleep -Seconds 2

          # Test via 127.0.0.1 now
          Write-Host "=== Testing via 127.0.0.1 after port forwarding ==="
          try {
            $resp = Invoke-WebRequest -Uri "http://127.0.0.1:2375/version" -UseBasicParsing -TimeoutSec 5
            Write-Host "Port forwarding works!"
            Write-Host $resp.Content
          } catch {
            Write-Host "Port forwarding test failed: $_"
            Write-Host "Trying alternate: localhost"
            try {
              $resp = Invoke-WebRequest -Uri "http://localhost:2375/version" -UseBasicParsing -TimeoutSec 5
              Write-Host "localhost works: $($resp.Content)"
            } catch {
              Write-Host "localhost also failed: $_"
            }
          }

          # Export WSL IP for subsequent steps
          echo "WSL_IP=$wslIp" >> $env:GITHUB_ENV

      - name: Verify Docker (from Windows via TCP)
        shell: powershell
        env:
          DOCKER_HOST: tcp://127.0.0.1:2375
        run: |
          Write-Host "=== curl version endpoint ==="
          $resp = Invoke-WebRequest -Uri "http://127.0.0.1:2375/version" -UseBasicParsing -TimeoutSec 10
          Write-Host $resp.Content
          Write-Host "=== curl info endpoint ==="
          $info = (Invoke-WebRequest -Uri "http://127.0.0.1:2375/info" -UseBasicParsing -TimeoutSec 10).Content | ConvertFrom-Json
          Write-Host "OS Type: $($info.OSType)"
          Write-Host "Architecture: $($info.Architecture)"
          Write-Host "Server Version: $($info.ServerVersion)"

      - name: Pull test image (from WSL)
        shell: wsl-bash {0}
        run: |
          echo "=== Pulling alpine:latest ==="
          docker pull alpine:latest
          echo "=== Pulling yaoapp/tai-sandbox-base:latest ==="
          docker pull yaoapp/tai-sandbox-base:latest
          echo "=== docker images ==="
          docker images

      - name: Run test container (from WSL)
        shell: wsl-bash {0}
        run: |
          echo "=== Running alpine echo ==="
          docker run --rm alpine:latest echo "Hello from Linux container on Windows!"
          echo "=== Running sandbox base ==="
          docker run --rm yaoapp/tai-sandbox-base:latest cat /etc/os-release

      - name: Pull image via TCP (from Windows side)
        shell: powershell
        env:
          DOCKER_HOST: tcp://127.0.0.1:2375
        run: |
          Write-Host "=== Pulling alpine via TCP from Windows ==="
          Invoke-WebRequest -Uri "http://127.0.0.1:2375/images/create?fromImage=alpine&tag=latest" -Method POST -UseBasicParsing -TimeoutSec 60
          Write-Host "=== Listing images via TCP ==="
          $images = (Invoke-WebRequest -Uri "http://127.0.0.1:2375/images/json" -UseBasicParsing -TimeoutSec 10).Content | ConvertFrom-Json
          $images | ForEach-Object { Write-Host "$($_.RepoTags) - $($_.Size)" }

      - name: Dump dockerd log on failure
        if: failure()
        shell: wsl-bash {0}
        run: cat /tmp/dockerd.log

      - name: Dump network diagnostics on failure
        if: failure()
        shell: powershell
        run: |
          Write-Host "=== WSL IP ==="
          wsl hostname -I
          Write-Host "=== Port proxy rules ==="
          netsh interface portproxy show v4tov4
          Write-Host "=== Listening ports ==="
          netstat -an | Select-String "2375"
          Write-Host "=== WSL network interfaces ==="
          wsl ip addr show
